services:
  app:
    build: .
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5173
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-change-me-with-a-long-random-secret}
      DATABASE_PATH: /app/.hiberota/database.sqlite
      REDIS_URL: redis://redis:6379
    volumes:
      - hiberota-data:/app/.hiberota
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    command: npm run worker
    profiles: ["worker"]
    environment:
      NODE_ENV: production
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-change-me-with-a-long-random-secret}
      DATABASE_PATH: /app/.hiberota/database.sqlite
      REDIS_URL: redis://redis:6379
    volumes:
      - hiberota-data:/app/.hiberota
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: hiberota
      POSTGRES_USER: hiberota
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  hiberota-data:
  redis-data:
  postgres-data:
