services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-5173}:5173"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5173
      DATABASE_PATH: /app/.hiberota/database.sqlite
      DATABASE_BACKUP_DIR: /app/.hiberota/backups
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: --max-old-space-size=768
    volumes:
      - hiberota-data:/app/.hiberota
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 1200m
    cpus: "1.50"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    mem_limit: 384m
    cpus: "0.50"

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: npm run worker
    profiles: ["worker"]
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/.hiberota/database.sqlite
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: --max-old-space-size=384
    volumes:
      - hiberota-data:/app/.hiberota
    depends_on:
      redis:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    mem_limit: 512m
    cpus: "0.50"

volumes:
  hiberota-data:
  redis-data:
